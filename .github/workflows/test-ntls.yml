name: test tengine ntls and xquic

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: "ubuntu-24.04"
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { compiler: GNU,  CC: gcc,  CXX: g++}
          - { compiler: LLVM, CC: clang, CXX: clang++}
    steps:
      - uses: actions/checkout@v3
        with:
          path: tengine
      - name: get dependencies
        run: |
          sudo apt install -y libpcre3 libpcre3-dev libevent-dev cmake
      - name: 'checkout luajit2'
        uses: actions/checkout@v3
        with:
          repository: openresty/luajit2
          path: luajit2
      - name: 'build luajit2'
        working-directory: luajit2
        run: |
          make
          sudo make install
      - name: 'checkout lua-resty-lrucache'
        uses: actions/checkout@v3
        with:
          repository: openresty/lua-resty-lrucache
          path: lua-resty-lrucache
      - name: 'build lua-resty-lrucache'
        working-directory: lua-resty-lrucache
        run: |
          sudo make install
      - name: 'checkout lua-resty-core'
        uses: actions/checkout@v3
        with:
          repository: openresty/lua-resty-core
          ref: v0.1.27
          path: lua-resty-core
      - name: 'build lua-resty-core'
        working-directory: lua-resty-core
        run: |
          sudo make install
      - name: checkout Tongsuo
        uses: actions/checkout@v3
        with:
          repository: Tongsuo-Project/Tongsuo
          ref: 8.4-stable
          path: Tongsuo
      - name: build Tongsuo
        working-directory: Tongsuo
        env:
          CC: ${{ matrix.compiler.CC }}
        run: |
          ./config --prefix=${RUNNER_TEMP}/tongsuo enable-ntls no-shared
          make -s -j4
          make install_sw
          make clean
      - name: checkout xquic
        uses: actions/checkout@v3
        with:
          repository: alibaba/xquic
          path: xquic
      - name: build xquic
        working-directory: xquic
        env:
          CC: ${{ matrix.compiler.CC }}
        run: |
          mkdir -p build && cd build
          if [ "${{ matrix.compiler.compiler }}" = "GNU" ]; then
            CFLAGS="-Wno-deprecated-declarations -Wno-dangling-pointer -Wno-stringop-truncation"
          else
            CFLAGS="-Wno-deprecated-declarations"
          fi
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="$CFLAGS" \
            -DXQC_ENABLE_TESTING=1 \
            -DXQC_SUPPORT_SENDMMSG_BUILD=1 \
            -DXQC_ENABLE_BBR2=1 \
            -DXQC_ENABLE_RENO=1 \
            -DSSL_TYPE=babassl \
            -DSSL_PATH=${RUNNER_TEMP}/tongsuo \
            -DSSL_INC_PATH=${RUNNER_TEMP}/tongsuo/include \
            -DSSL_LIB_PATH="${RUNNER_TEMP}/tongsuo/lib64/libssl.a;${RUNNER_TEMP}/tongsuo/lib64/libcrypto.a"
          make -j4
          sudo cp "libxquic.so" /usr/local/lib/
      - name: build Tengine
        working-directory: tengine
        env:
          CC: ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
          LUAJIT_LIB: /usr/local/lib
          LUAJIT_INC: /usr/local/include/luajit-2.1
        run: |
          ./configure \
            --with-ld-opt="-Wl,-lpcre,-rpath,/usr/local/lib" \
            --with-pcre \
            --add-module=modules/ngx_tongsuo_ntls \
            --add-module=modules/ngx_http_lua_module \
            --add-module=modules/ngx_http_xquic_module \
            --with-openssl=../Tongsuo \
            --with-openssl-opt="--api=1.1.1 enable-ntls" \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-stream \
            --with-stream_ssl_module \
            --with-stream_sni \
            --with-xquic-inc="../xquic/include" \
            --with-xquic-lib="../xquic/build"
          make -j2
          sudo make install
      - name: run ntls test cases
        working-directory: tengine
        env:
          TEST_OPENSSL_BINARY: ${{ runner.temp }}/tongsuo/bin/tongsuo
          TEST_NGINX_BINARY: /usr/local/nginx/sbin/nginx
          TEST_NGINX_LEAVE: 1
        run: |
          prove -Itests/nginx-tests/nginx-tests/lib/ modules/ngx_tongsuo_ntls/t
      - name: run xquic test cases
        working-directory: tengine
        env:
          TEST_XQUIC_CLIENT: ${{ github.workspace }}/xquic/build/test_client
          TEST_NGINX_BINARY: /usr/local/nginx/sbin/nginx
          TEST_NGINX_LEAVE: 1
        run: |
          prove -Itests/nginx-tests/nginx-tests/lib/ modules/ngx_http_xquic_module/t
      - name: debug
        if: ${{ failure() }}
        run: |
          for file in `ls /tmp/nginx-test-*/error.log`; do cat $file; done
